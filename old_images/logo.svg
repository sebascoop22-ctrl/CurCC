<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ornate Architectural Archway Icon -->
  <g transform="translate(200, 70)">
    <!-- Left Pilaster/Column -->
    <line x1="-60" y1="0" x2="-60" y2="50" stroke="#d4c5a9" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right Pilaster/Column -->
    <line x1="60" y1="0" x2="60" y2="50" stroke="#d4c5a9" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Horizontal Entablature -->
    <line x1="-60" y1="0" x2="60" y2="0" stroke="#d4c5a9" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Arched Opening -->
    <path d="M -60 0 Q 0 35 60 0" stroke="#d4c5a9" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Ornate Decorative Flourish/Crest Above Entablature - more detailed -->
    <path d="M -40 -12 Q -35 -25 -30 -12 Q -25 -22 -20 -12 Q -15 -22 -10 -12 Q -5 -22 0 -12 Q 5 -22 10 -12 Q 15 -22 20 -12 Q 25 -22 30 -12 Q 35 -25 40 -12" 
          stroke="#d4c5a9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Additional ornate details for crest -->
    <circle cx="-35" cy="-14" r="2" fill="#d4c5a9"/>
    <circle cx="0" cy="-20" r="2" fill="#d4c5a9"/>
    <circle cx="35" cy="-14" r="2" fill="#d4c5a9"/>
    <!-- Small decorative elements on crest -->
    <path d="M -25 -10 L -25 -12 M -15 -10 L -15 -12 M 15 -10 L 15 -12 M 25 -10 L 25 -12" 
          stroke="#d4c5a9" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  
  <!-- COOPER Text (Large Serif Uppercase) -->
  <text x="200" y="200" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="64" 
        font-weight="500" 
        fill="#d4c5a9" 
        text-anchor="middle"
        letter-spacing="5px">
    COOPER
  </text>
  
  <!-- CONCIERGE Text (Smaller Serif Uppercase) -->
  <text x="200" y="245" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="36" 
        font-weight="400" 
        fill="#d4c5a9" 
        text-anchor="middle"
        letter-spacing="6px">
    CONCIERGE
  </text>
</svg>
